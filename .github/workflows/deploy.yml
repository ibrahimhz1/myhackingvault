# .github/workflows/deploy.yml
#
# Quartz v5 — Deploy to GitHub Pages
# ════════════════════════════════════
# Triggers:
#   1. Push to main branch
#   2. Cross-repo dispatch from myhackingnotesprivate (notes updated)
#   3. Manual trigger from GitHub Actions UI
#
# Key v5 changes vs older versions:
#   - Node 22+ required (using 22 LTS for stability)
#   - `npx quartz plugin install` (no --from-config flag in v5)
#   - Plugin cache uses quartz.lock.json as key
#   - actions/checkout@v4, setup-node@v4 (stable versions)

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [notes-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with notes submodule)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0              # full history for git-based dates
          submodules: recursive       # pulls myhackingnotesprivate → content/
          token: ${{ secrets.NOTES_REPO_TOKEN }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22            # Quartz v5 requires Node 22+
          cache: "npm"

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Quartz community plugins
        run: npx quartz plugin install

      - name: Build site
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
