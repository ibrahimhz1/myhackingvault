# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
#
# ╔══════════════════════════════════════════════════════════════╗
# ║            MY HACKING VAULT — quartz.config.yaml            ║
# ║  PRIMARY config for Quartz v5. Edit THIS file, not the .ts  ║
# ║  When upgrading: git pull upstream → conflicts here only    ║
# ╚══════════════════════════════════════════════════════════════╝

configuration:
  pageTitle: "Hz Knowledge Base"
  pageTitleSuffix: " | myvault.ibrahimhz.com"
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: null                      # ← set to umami/plausible when ready
  locale: en-US
  baseUrl: myvault.ibrahimhz.com        # ← no https://, no trailing slash

  ignorePatterns:
    - private
    - _private
    - templates
    - .obsidian
    - .trash
    - "*.canvas"

  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: "Share Tech Mono"         # hacker terminal font for headings
      body: "Source Sans Pro"
      code: "JetBrains Mono"            # best code font for security notes
    colors:
      # ── Light mode (minimal — most users will be in dark) ──
      lightMode:
        light: "#f0f4f0"
        lightgray: "#d8e0d8"
        gray: "#8a9a8a"
        darkgray: "#2a3a2a"
        dark: "#0d1a0d"
        secondary: "#00aa44"            # terminal green
        tertiary: "#007733"
        highlight: "rgba(0, 170, 68, 0.10)"
        textHighlight: "#00ff4488"
      # ── Dark mode — hacker terminal aesthetic ──
      darkMode:
        light: "#0d0d0d"                # near-black background
        lightgray: "#1a1a2e"            # dark navy sidebar bg
        gray: "#3a3a5c"                 # muted borders
        darkgray: "#a0a0b0"             # body text (readable grey)
        dark: "#e0ffe0"                 # near-white text — slight green tint
        secondary: "#00ff88"            # bright terminal green — primary accent
        tertiary: "#00cc66"             # dimmer green — hover states
        highlight: "rgba(0, 255, 136, 0.08)"
        textHighlight: "#00ff8844"

# ══════════════════════════════════════════════════════════════
# PLUGINS — ordered by execution (order: field controls sequence)
# ══════════════════════════════════════════════════════════════
plugins:
  # ── Transformers (parse & transform content) ──────────────
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 5

  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10

  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: one-dark-pro             # dark theme for code blocks
      keepBackground: true             # keep dark bg even in light mode
    order: 20

  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30

  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40

  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30

  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60

  - source: github:quartz-community/description
    enabled: true
    order: 70

  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80

  - source: github:quartz-community/roam
    enabled: false
    order: 90

  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 95

  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 100

  - source: github:quartz-community/citations
    enabled: false
    order: 110

  # ── Filters (what gets published) ─────────────────────────
  - source: github:quartz-community/explicit-publish
    enabled: true                      # ONLY notes with publish: true are built
    order: 10

  - source: github:quartz-community/remove-draft
    enabled: true                      # skip notes with draft: true
    order: 20

  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45

  - source: github:quartz-community/encrypted-pages
    enabled: false                     # enable if you want password-protected notes
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
    order: 900
    layout:
      position: body
      priority: 100
      display: all

  # ── Emitters (generate output files) ──────────────────────
  - source: github:quartz-community/alias-redirects
    enabled: true
    order: 10

  - source: github:quartz-community/content-page
    enabled: true
    order: 20

  - source: github:quartz-community/folder-page
    enabled: true
    order: 30

  - source: github:quartz-community/tag-page
    enabled: true
    order: 40

  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50

  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
      rssLimit: 30
      rssFullHtml: false
      includeEmptyFiles: false
    order: 60

  - source: github:quartz-community/og-image
    enabled: true                      # auto-generates OG images for social sharing
    order: 70

  - source: github:quartz-community/cname
    enabled: true                      # auto-creates CNAME file for custom domain
    options:
      cname: myvault.ibrahimhz.com
    order: 80

  - source: github:quartz-community/favicon
    enabled: true
    order: 90

  - source: github:quartz-community/canvas-page
    enabled: true
    options: {}
    order: 100

  # ── Layout Components ──────────────────────────────────────
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10

  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20

  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar

  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar

  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only

  - source: github:quartz-community/explorer
    enabled: true
    options:
      title: "[ vault ]"              # hacker-style explorer title
      folderClickBehavior: collapse
      folderDefaultState: collapsed
      useSavedState: true
    layout:
      position: left
      priority: 50

  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index

  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10

  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20

  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30

  - source: github:quartz-community/graph
    enabled: true
    options:
      localGraph:
        showTags: true
        depth: 2
        scale: 1.1
        repelForce: 0.5
        centerForce: 0.3
        linkDistance: 30
        fontSize: 0.6
        opacityScale: 1
      globalGraph:
        showTags: true
        scale: 0.9
    layout:
      position: right
      priority: 10

  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 20

  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: "Recent Notes"        # hacker flavour
      limit: 5
    layout:
      position: right
      priority: 25

  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all

  - source: github:quartz-community/comments
    enabled: false                     # enable when giscus is set up
    options:
      provider: giscus
      options:
        repo: ibrahimhz1/myhackingvault
        repoId: ""                     # ← fill from giscus.app
        category: Announcements
        categoryId: ""                 # ← fill from giscus.app
        lang: en
    layout:
      position: afterBody
      priority: 10

  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/ibrahimhz1
        Linkedin: https://linkedin.com/in/ibrahimhz
      showQuartzVersion: false

# ══════════════════════════════════════════════════════════════
# LAYOUT — per-page-type overrides
# ══════════════════════════════════════════════════════════════
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}                        # use defaults for note pages
    folder:
      exclude:
        - reader-mode
      positions:
        right: []                      # no graph/backlinks on folder pages
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
